<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental War Galactic</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --bg2: #0a1628;
    --grid: rgba(0,200,255,0.04);
    --team1: #00e5ff;
    --team2: #ff4444;
    --team3: #44ff88;
    --neutral: #888;
    --gold: #ffd700;
    --text: #c8e0ff;
    --dim: #4a6080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh; overflow: hidden; position: relative;
  }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .screen.hidden { display: none; }

  /* ===== LOBBY ===== */
  .lobby-box {
    background: linear-gradient(135deg, rgba(10,22,40,0.97), rgba(5,10,20,0.97));
    border: 1px solid rgba(0,200,255,0.2); border-radius: 4px;
    padding: 48px 56px; width: 480px;
    box-shadow: 0 0 60px rgba(0,200,255,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    text-align: center;
  }
  .lobby-title { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; letter-spacing: 4px; color: var(--team1); text-shadow: 0 0 30px rgba(0,229,255,0.5); margin-bottom: 8px; }
  .lobby-sub { font-size: 11px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 40px; }
  .lobby-input { width: 100%; background: rgba(0,200,255,0.05); border: 1px solid rgba(0,200,255,0.2); border-radius: 2px; color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 16px; padding: 14px 18px; outline: none; margin-bottom: 20px; transition: border-color 0.2s; }
  .lobby-input:focus { border-color: var(--team1); }
  .lobby-input::placeholder { color: var(--dim); }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 2px; font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 3px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-primary { background: linear-gradient(135deg, var(--team1), #0088aa); color: #000; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
  .btn-primary:hover { box-shadow: 0 0 40px rgba(0,229,255,0.5); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-danger { background: linear-gradient(135deg, var(--team2), #880000); color: #fff; box-shadow: 0 0 20px rgba(255,68,68,0.3); margin-top: 10px; }
  .players-waiting { margin-top: 32px; text-align: left; }
  .players-waiting-title { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-bottom: 12px; }
  .player-chip { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; padding: 6px 12px; margin: 4px; font-size: 13px; }
  .player-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-t1 { background: var(--team1); box-shadow: 0 0 8px var(--team1); }
  .dot-t2 { background: var(--team2); box-shadow: 0 0 8px var(--team2); }
  .dot-t3 { background: var(--team3); box-shadow: 0 0 8px var(--team3); }
  .launch-section { margin-top: 24px; }
  .launch-info { font-size: 12px; color: var(--dim); margin-bottom: 12px; }

  /* ===== HUD ===== */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: 50px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: rgba(5,10,20,0.92);
    border-bottom: 1px solid rgba(0,200,255,0.1);
    z-index: 100; gap: 16px;
  }
  .hud-player { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px; }
  .hud-scores { display: flex; gap: 20px; }
  .hud-score { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .hud-dot { width: 9px; height: 9px; border-radius: 50%; }

  /* ===== BANDEAU ÉQUIPE ===== */
  #team-banner {
    position: fixed; top: 50px; left: 0; right: 0; height: 42px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    z-index: 99;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .banner-planet { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; letter-spacing: 3px; }
  .banner-stats { display: flex; gap: 32px; font-size: 12px; }
  .banner-stat { display: flex; align-items: center; gap: 8px; }
  .banner-stat-label { letter-spacing: 1px; opacity: 0.6; font-size: 10px; }
  .banner-stat-val { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 15px; }
  .banner-timer { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700; min-width: 60px; text-align: right; }
  .banner-timer.urgent { animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  /* ===== MAP ===== */
  #map-container { position: fixed; top: 92px; left: 0; right: 320px; bottom: 0; z-index: 5; }
  #map-svg { width: 100%; height: 100%; }

  /* ===== PANEL DROITE ===== */
  #right-panel {
    position: fixed; top: 92px; right: 0; bottom: 0; width: 320px;
    background: rgba(5,10,20,0.97);
    border-left: 1px solid rgba(0,200,255,0.15);
    z-index: 200;
    display: flex; flex-direction: column;
  }

  /* Questions */
  #question-panel { padding: 24px 22px; display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
  #question-panel.hidden { display: none; }
  .q-label { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; }
  .q-progress { display: flex; gap: 5px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
  .q-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: background 0.3s; }
  .q-dot.correct { background: var(--team3); box-shadow: 0 0 8px var(--team3); }
  .q-dot.wrong { background: var(--team2); box-shadow: 0 0 8px var(--team2); }
  .q-dot.active { background: var(--team1); box-shadow: 0 0 8px var(--team1); animation: blink 0.8s infinite alternate; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
  .q-text { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 20px; letter-spacing: 1px; text-align: center; line-height: 1.3; }
  .q-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .q-btn { padding: 13px 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 19px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .q-btn:hover { background: rgba(0,200,255,0.1); border-color: var(--team1); color: #fff; }
  .q-btn.correct { background: rgba(68,255,136,0.15); border-color: var(--team3); color: var(--team3); }
  .q-btn.wrong { background: rgba(255,68,68,0.15); border-color: var(--team2); color: var(--team2); }
  .q-btn:disabled { cursor: default; }

  /* Attaque */
  #attack-panel { padding: 24px 22px; display: flex; flex-direction: column; align-items: center; flex: 1; }
  #attack-panel.hidden { display: none; }
  .ap-ships-big { font-family: 'Orbitron', monospace; font-size: 68px; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.5); line-height: 1; margin: 12px 0 4px; }
  .ap-ships-label { font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-bottom: 28px; }
  .ap-step { width: 100%; padding: 13px 14px; border-radius: 2px; font-size: 13px; line-height: 1.5; margin-bottom: 10px; text-align: center; }
  .ap-step-active { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.3); color: var(--team1); font-weight: 600; }
  .ap-step-done { background: rgba(68,255,136,0.06); border: 1px solid rgba(68,255,136,0.2); color: var(--team3); }
  .ap-step-waiting { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); color: var(--dim); }
  .ap-cancel { margin-top: auto; background: none; border: none; color: var(--dim); font-size: 11px; cursor: pointer; letter-spacing: 2px; text-decoration: underline; padding: 8px; }
  .ap-cancel:hover { color: var(--text); }

  /* ===== WINNER ===== */
  #winner-screen { flex-direction: column; background: rgba(0,0,0,0.85); z-index: 300; }
  .winner-box { text-align: center; padding: 60px; }
  .winner-label { font-size: 11px; letter-spacing: 4px; color: var(--dim); margin-bottom: 16px; }
  .winner-name { font-family: 'Orbitron', monospace; font-size: 64px; font-weight: 900; letter-spacing: 6px; margin-bottom: 8px; }
  .winner-sub { font-size: 14px; color: var(--dim); letter-spacing: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.4s ease forwards; }

  #toast { position: fixed; top: 100px; left: calc(50% - 160px); background: rgba(10,22,40,0.95); border: 1px solid rgba(0,200,255,0.2); border-radius: 2px; padding: 10px 18px; font-size: 12px; z-index: 400; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  #toast.hidden { opacity: 0; }

  @keyframes selectPulse { 0% { stroke-width: 3; opacity: 0.9; } 50% { stroke-width: 6; opacity: 0.5; } 100% { stroke-width: 3; opacity: 0.9; } }
  .planet-selected-ring { animation: selectPulse 1s infinite; }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <div class="lobby-box fade-in">
    <div class="lobby-title">MENTAL WAR</div>
    <div class="lobby-sub">Galactic Edition</div>
    <input class="lobby-input" id="pseudo-input" type="text" placeholder="Ton pseudo de commandant" maxlength="16" onkeydown="if(event.key==='Enter') joinLobby()">
    <button class="btn btn-primary" id="join-btn" onclick="joinLobby()">Rejoindre la galaxie</button>
    <div class="players-waiting" id="players-waiting" style="display:none">
      <div class="players-waiting-title">Commandants en attente</div>
      <div id="players-list"></div>
      <div class="launch-section" id="launch-section" style="display:none">
        <div class="launch-info" id="launch-info"></div>
        <button class="btn btn-primary" onclick="launchGame()">⚡ Lancer la partie</button>
      </div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen hidden">

  <!-- HUD global -->
  <div id="hud">
    <div class="hud-player" id="hud-player"></div>
    <div class="hud-scores" id="hud-scores"></div>
  </div>

  <!-- Bandeau équipe -->
  <div id="team-banner">
    <div class="banner-planet" id="banner-planet"></div>
    <div class="banner-stats">
      <div class="banner-stat">
        <span class="banner-stat-label">MOI</span>
        <span class="banner-stat-val" id="banner-my-ships">0</span>
        <span style="font-size:11px;opacity:0.5">🚀</span>
      </div>
      <div class="banner-stat">
        <span class="banner-stat-label">ÉQUIPE</span>
        <span class="banner-stat-val" id="banner-team-ships">0</span>
        <span style="font-size:11px;opacity:0.5">🚀</span>
      </div>
    </div>
    <div class="banner-timer" id="banner-timer">60</div>
  </div>

  <!-- Carte -->
  <div id="map-container">
    <svg id="map-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow-t1"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-t2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-t3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-n"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g id="planets-layer"></g>
      <g id="projectiles-layer"></g>
    </svg>
  </div>

  <!-- Panel droite -->
  <div id="right-panel">
    <div id="question-panel"></div>
    <div id="attack-panel" class="hidden">
      <div class="ap-ships-big" id="ap-ships">0</div>
      <div class="ap-ships-label">VAISSEAUX DISPONIBLES</div>
      <div id="ap-step1" class="ap-step ap-step-active">① Clique sur une de tes planètes (départ)</div>
      <div id="ap-step2" class="ap-step ap-step-waiting">② Clique sur la planète cible</div>
      <button class="ap-cancel" id="ap-cancel-btn" onclick="cancelAttackSelection()" style="display:none">✕ Annuler la sélection</button>
      <button class="ap-cancel" onclick="skipAttack()" style="margin-top:8px">Passer →</button>
    </div>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen" class="screen hidden">
  <div class="winner-box">
    <div class="winner-label">VICTOIRE</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub" id="winner-sub"></div>
    <button class="btn btn-danger" style="margin-top:40px;width:auto;padding:14px 40px;" onclick="resetGame()">Nouvelle partie</button>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQcGzJ0WN78p5YcyIzUoj3E9qXzDb00vg",
  authDomain: "mental-war-galactic.firebaseapp.com",
  databaseURL: "https://mental-war-galactic-default-rtdb.firebaseio.com",
  projectId: "mental-war-galactic",
  storageBucket: "mental-war-galactic.firebasestorage.app",
  messagingSenderId: "677087172217",
  appId: "1:677087172217:web:4b9e8cfb36db19e19f66a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TEAM_COLORS  = { t1: '#00e5ff', t2: '#ff4444', t3: '#44ff88' };
const TEAM_NAMES   = { t1: 'Équipe Cyan', t2: 'Équipe Rouge', t3: 'Équipe Verte' };
const PLANET_NAMES = { t1: '★ AETHON', t2: '★ MALACHAR', t3: '★ VIRIDIS' };
const MIN_PLAYERS  = 2;
const ANIM_DURATION = 2700;

let myId = null, myTeam = null, myPseudo = null;
let gameState = null;
let questions = [], currentQ = 0, answers = [], earnedShips = 0;
let attackStep = 0, fromPlanet = null, toPlanet = null;
let regenInterval = null, timerInterval = null;
let attackPending = false;
let myTotalShips = 0; // total envoyés par moi dans cette partie

// ===== STARS =====
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i=0;i<200;i++) {
      ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${Math.random()*0.8+0.2})`;
      ctx.fill();
    }
  }
  window.addEventListener('resize', resize);
  resize();
})();

// ===== TOAST =====
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hidden'), duration);
}

// ===== LOBBY =====
window.joinLobby = async function() {
  const pseudo = document.getElementById('pseudo-input').value.trim();
  if (!pseudo) { showToast('Entre un pseudo !'); return; }
  myPseudo = pseudo;
  myId = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  document.getElementById('join-btn').disabled = true;

  const stateSnap = await get(ref(db, 'game/state'));
  if (stateSnap.val() === 'playing') {
    showToast('Partie en cours, attends la prochaine !');
    document.getElementById('join-btn').disabled = false;
    return;
  }

  const playersSnap = await get(ref(db, 'game/players'));
  const existing = playersSnap.val() || {};
  const counts = { t1: 0, t2: 0, t3: 0 };
  Object.values(existing).forEach(p => { if (p.team) counts[p.team]++; });
  myTeam = Object.keys(counts).reduce((a,b) => counts[a] <= counts[b] ? a : b);

  await set(ref(db, `game/players/${myId}`), { pseudo, team: myTeam, id: myId, online: true, totalShips: 0 });
  document.getElementById('players-waiting').style.display = 'block';

  onValue(ref(db, 'game/players'), snap => {
    const players = snap.val() || {};
    renderLobbyPlayers(players);
    const count = Object.keys(players).length;
    const ls = document.getElementById('launch-section');
    const li = document.getElementById('launch-info');
    if (count >= MIN_PLAYERS) {
      ls.style.display = 'block';
      li.textContent = `${count} commandant(s) prêt(s) — lancer la partie !`;
    } else {
      ls.style.display = 'none';
      li.textContent = `En attente... (${count}/${MIN_PLAYERS})`;
    }
  });

  onValue(ref(db, 'game/state'), snap => {
    if (snap.val() === 'playing') startGameScreen();
  });
};

function renderLobbyPlayers(players) {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  Object.values(players).forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `<div class="player-dot dot-${p.team}"></div><span>${p.pseudo}</span>`;
    list.appendChild(chip);
  });
}

window.launchGame = async function() {
  const map = generateMap();
  await update(ref(db, 'game'), { state: 'playing', map, startedAt: Date.now() });
};

// ===== MAP GENERATION =====
function generateMap() {
  const planets = {};
  const W = 1000, H = 700, margin = 100;
  const teamPos = [{ x: 180, y: 350 }, { x: 820, y: 200 }, { x: 820, y: 520 }];
  ['t1','t2','t3'].forEach((team, i) => {
    planets[`planet_${team}`] = { id: `planet_${team}`, x: teamPos[i].x, y: teamPos[i].y, r: 40, team, ships: 50, isHome: true };
  });
  const placed = [...teamPos];
  for (let n = 0; n < 8; n++) {
    let pos, attempts = 0;
    do {
      pos = { x: margin + Math.random()*(W-2*margin), y: margin + Math.random()*(H-2*margin) };
      attempts++;
    } while (attempts < 100 && placed.some(p => Math.hypot(p.x-pos.x, p.y-pos.y) < 130));
    placed.push(pos);
    planets[`planet_n${n}`] = {
      id: `planet_n${n}`, x: Math.round(pos.x), y: Math.round(pos.y),
      r: 20 + Math.floor(Math.random()*12), team: 'neutral',
      ships: 10 + Math.floor(Math.random()*21), isHome: false
    };
  }
  return planets;
}

// ===== GAME SCREEN =====
function startGameScreen() {
  document.getElementById('lobby-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  // HUD player
  const color = TEAM_COLORS[myTeam];
  document.getElementById('hud-player').innerHTML = `<span style="color:${color}">●</span> ${myPseudo}`;

  // Bandeau équipe
  const banner = document.getElementById('team-banner');
  banner.style.background = hexToRgba(color, 0.12);
  banner.style.borderBottom = `1px solid ${hexToRgba(color, 0.3)}`;
  const planetEl = document.getElementById('banner-planet');
  planetEl.textContent = PLANET_NAMES[myTeam];
  planetEl.style.color = color;
  planetEl.style.textShadow = `0 0 20px ${hexToRgba(color, 0.5)}`;

  // Écoute carte
  onValue(ref(db, 'game/map'), snap => {
    gameState = snap.val();
    if (gameState) renderMap(gameState);
  });

  // Écoute joueurs pour total équipe + regen adaptative
  onValue(ref(db, 'game/players'), snap => {
    const players = snap.val() || {};
    updateTeamShips(players);
    // Regen adaptative
    const count = Object.keys(players).length;
    restartRegen(count);
  });

  // Écoute les projectiles Firebase
  onValue(ref(db, 'game/projectiles'), snap => {
    const projs = snap.val();
    if (!projs) return;
    Object.entries(projs).forEach(([key, proj]) => {
      if (proj.seen && proj.seen[myId]) return; // déjà animé
      if (!proj.from || !gameState) return;
      const fromP = { x: proj.fx, y: proj.fy };
      const toP   = { x: proj.tx, y: proj.ty };
      animateProjectile(fromP, toP, TEAM_COLORS[proj.team] || '#fff', proj.ships);
      // Marque comme vu
      set(ref(db, `game/projectiles/${key}/seen/${myId}`), true);
    });
  });

  // Écoute victoire
  onValue(ref(db, 'game/winner'), snap => { const w = snap.val(); if (w) showWinner(w); });

  // Lance le quiz
  startQuiz();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ===== TEAM SHIPS (bandeau) =====
function updateTeamShips(players) {
  let teamTotal = 0;
  Object.values(players).forEach(p => {
    if (p.team === myTeam) teamTotal += (p.totalShips || 0);
  });
  document.getElementById('banner-my-ships').textContent = myTotalShips;
  document.getElementById('banner-team-ships').textContent = teamTotal;
}

// ===== MAP RENDERING =====
function renderMap(planets) {
  const layer = document.getElementById('planets-layer');
  layer.innerHTML = '';
  Object.values(planets).forEach(p => {
    const color = p.team === 'neutral' ? '#888888' : TEAM_COLORS[p.team];
    const fid   = p.team === 'neutral' ? 'glow-n' : `glow-${p.team}`;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', `planet-g-${p.id}`);
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => onPlanetClick(p.id));

    const halo = mkCircle(p.x, p.y, p.r+8, 'none', color, '1', '0.3');
    halo.setAttribute('filter', `url(#${fid})`);
    g.appendChild(halo);

    const body = mkCircle(p.x, p.y, p.r, color, 'none', '0', p.team==='neutral'?'0.4':'0.7');
    body.setAttribute('filter', `url(#${fid})`);
    g.appendChild(body);

    if (p.isHome) {
      const ring = mkCircle(p.x, p.y, p.r+14, 'none', color, '1.5', '0.5');
      ring.setAttribute('stroke-dasharray', '4 4');
      g.appendChild(ring);
    }

    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', p.x); txt.setAttribute('y', p.y+5);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-family', 'Orbitron,monospace');
    txt.setAttribute('font-size', p.isHome ? '14' : '11');
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('fill', '#fff');
    txt.setAttribute('pointer-events', 'none');
    txt.textContent = Math.floor(p.ships);
    g.appendChild(txt);

    layer.appendChild(g);
  });

  if (fromPlanet) highlightPlanet(fromPlanet);
  updateHudScores(planets);
  checkWinner(planets);
}

function mkCircle(cx, cy, r, fill, stroke, sw, opacity) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
  c.setAttribute('fill', fill); c.setAttribute('stroke', stroke);
  c.setAttribute('stroke-width', sw); c.setAttribute('opacity', opacity);
  return c;
}

function highlightPlanet(planetId) {
  document.getElementById('selection-ring')?.remove();
  if (!planetId || !gameState?.[planetId]) return;
  const p = gameState[planetId];
  const ring = mkCircle(p.x, p.y, p.r+18, 'none', TEAM_COLORS[myTeam], '3', '0.9');
  ring.setAttribute('id', 'selection-ring');
  ring.setAttribute('class', 'planet-selected-ring');
  ring.setAttribute('pointer-events', 'none');
  document.getElementById('planets-layer').appendChild(ring);
}

function updateHudScores(planets) {
  const scores = { t1: 0, t2: 0, t3: 0 };
  Object.values(planets).forEach(p => { if (p.team !== 'neutral') scores[p.team] += Math.floor(p.ships); });
  document.getElementById('hud-scores').innerHTML = ['t1','t2','t3'].map(t =>
    `<div class="hud-score"><div class="hud-dot" style="background:${TEAM_COLORS[t]};box-shadow:0 0 8px ${TEAM_COLORS[t]}"></div><span style="color:${TEAM_COLORS[t]}">${scores[t]}</span></div>`
  ).join('');
}

// ===== TIMER PERSONNEL =====
function startPersonalTimer(seconds) {
  clearInterval(timerInterval);
  let remaining = seconds;
  const el = document.getElementById('banner-timer');
  el.style.color = TEAM_COLORS[myTeam];
  el.classList.remove('urgent');
  el.textContent = remaining;
  timerInterval = setInterval(() => {
    remaining--;
    el.textContent = remaining;
    if (remaining <= 10) {
      el.style.color = '#ff4444';
      el.classList.add('urgent');
    }
    if (remaining <= 0) {
      clearInterval(timerInterval);
      // Force l'affichage attaque même si questions pas finies
      forceEndQuiz();
    }
  }, 1000);
}

function forceEndQuiz() {
  currentQ = 10; // force la fin
  if (earnedShips > 0) {
    showAttackPanel();
  } else {
    startQuiz(); // 0 vaisseau → quiz suivant direct
  }
}

// ===== QUIZ =====
function startQuiz() {
  questions = generateQuestions();
  currentQ = 0; answers = []; earnedShips = 0;
  attackStep = 0; fromPlanet = null; toPlanet = null;
  document.getElementById('attack-panel').classList.add('hidden');
  document.getElementById('question-panel').style.display = 'flex';
  renderQuestion();
  startPersonalTimer(60);
}

function generateQuestions() {
  const qs = [];
  for (let i = 0; i < 10; i++) {
    const type = Math.floor(Math.random() * 4);
    let a, b, answer, question;
    if (type === 0) { a = Math.floor(Math.random()*50)+10; b = Math.floor(Math.random()*50)+10; answer = a+b; question = `${a} + ${b}`; }
    else if (type === 1) { a = Math.floor(Math.random()*50)+30; b = Math.floor(Math.random()*30)+5; answer = a-b; question = `${a} − ${b}`; }
    else if (type === 2) { a = Math.floor(Math.random()*9)+2; b = Math.floor(Math.random()*9)+2; answer = a*b; question = `${a} × ${b}`; }
    else { b = Math.floor(Math.random()*8)+2; a = b*(Math.floor(Math.random()*8)+2); answer = a/b; question = `${a} ÷ ${b}`; }
    const wrongs = new Set();
    while (wrongs.size < 3) { const w = answer + Math.floor(Math.random()*10)-5; if (w !== answer && w > 0) wrongs.add(w); }
    qs.push({ question, answer, choices: [answer, ...[...wrongs]].sort(() => Math.random()-0.5) });
  }
  return qs;
}

function renderQuestion() {
  const panel = document.getElementById('question-panel');
  if (currentQ >= 10) {
    clearInterval(timerInterval);
    if (earnedShips === 0) {
      // 0 vaisseau → quiz suivant immédiat
      panel.innerHTML = `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px">
        <div style="font-size:40px">😔</div>
        <div style="font-family:Orbitron,monospace;font-size:13px;letter-spacing:2px;color:var(--dim)">AUCUN VAISSEAU</div>
        <div style="font-size:12px;color:var(--dim)">Nouveau quiz dans 2s…</div>
      </div>`;
      setTimeout(() => startQuiz(), 2000);
    } else {
      showAttackPanel();
    }
    return;
  }

  const q = questions[currentQ];
  let dotsHTML = '<div class="q-progress">';
  for (let i = 0; i < 10; i++) {
    let cls = 'q-dot';
    if (i < currentQ) cls += answers[i] ? ' correct' : ' wrong';
    else if (i === currentQ) cls += ' active';
    dotsHTML += `<div class="${cls}"></div>`;
  }
  dotsHTML += '</div>';

  panel.innerHTML = `
    <div class="q-label">Question ${currentQ+1} / 10</div>
    ${dotsHTML}
    <div class="q-text">${q.question} = ?</div>
    <div class="q-answers" id="q-answers"></div>`;

  panel.querySelector('#q-answers').querySelectorAll && panel.querySelector('#q-answers');
  const answersEl = panel.querySelector('#q-answers');
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.textContent = c;
    btn.onclick = () => answerQuestion(c, q.answer);
    answersEl.appendChild(btn);
  });
}

function answerQuestion(chosen, correct) {
  const isCorrect = chosen === correct;
  answers.push(isCorrect);
  if (isCorrect) earnedShips++;
  document.querySelectorAll('.q-btn').forEach(btn => {
    btn.disabled = true;
    if (Number(btn.textContent) === correct) btn.classList.add('correct');
    else if (Number(btn.textContent) === chosen && !isCorrect) btn.classList.add('wrong');
  });
  setTimeout(() => { currentQ++; renderQuestion(); }, 450);
}

// ===== ATTACK PANEL =====
function showAttackPanel() {
  clearInterval(timerInterval);
  document.getElementById('question-panel').style.display = 'none';
  document.getElementById('attack-panel').classList.remove('hidden');
  attackStep = 1; fromPlanet = null; toPlanet = null;
  document.getElementById('ap-ships').textContent = earnedShips;
  updateAttackUI();
}

function updateAttackUI() {
  const s1 = document.getElementById('ap-step1');
  const s2 = document.getElementById('ap-step2');
  const cb = document.getElementById('ap-cancel-btn');
  if (attackStep === 1) {
    s1.className = 'ap-step ap-step-active';
    s1.textContent = '① Clique sur une de tes planètes (départ)';
    s2.className = 'ap-step ap-step-waiting';
    s2.textContent = '② Clique sur la planète cible';
    cb.style.display = 'none';
  } else {
    s1.className = 'ap-step ap-step-done';
    const fp = gameState?.[fromPlanet];
    s1.textContent = `① Départ : ${fp ? Math.floor(fp.ships)+' pts' : '?'}`;
    s2.className = 'ap-step ap-step-active';
    s2.textContent = '② Clique sur la planète cible';
    cb.style.display = 'block';
  }
}

// ===== CLIC PLANÈTE =====
function onPlanetClick(planetId) {
  if (attackStep === 0) return;
  if (earnedShips === 0) return;
  const planet = gameState?.[planetId];
  if (!planet) return;

  if (attackStep === 1) {
    if (planet.team !== myTeam) { showToast('Choisis une de tes planètes comme départ !'); return; }
    fromPlanet = planetId;
    attackStep = 2;
    highlightPlanet(fromPlanet);
    updateAttackUI();
  } else if (attackStep === 2) {
    if (planetId === fromPlanet) { showToast('Choisis une planète différente !'); return; }
    toPlanet = planetId;
    fireAttack();
  }
}

async function fireAttack() {
  if (attackPending) return;
  attackPending = true;

  const fp = gameState[fromPlanet];
  const tp = gameState[toPlanet];
  const ships = earnedShips;

  // Écrit le projectile dans Firebase pour que tous le voient
  const projRef = push(ref(db, 'game/projectiles'));
  await set(projRef, {
    fx: fp.x, fy: fp.y,
    tx: tp.x, ty: tp.y,
    team: myTeam, ships,
    ts: Date.now(),
    seen: { [myId]: true }
  });
  // Anime localement (déjà marqué comme vu)
  animateProjectile({ x: fp.x, y: fp.y }, { x: tp.x, y: tp.y }, TEAM_COLORS[myTeam], ships);

  // Applique l'attaque
  await applyAttack(toPlanet, myTeam, ships);

  // Met à jour le total envoyé
  myTotalShips += ships;
  await update(ref(db, `game/players/${myId}`), { totalShips: myTotalShips });
  document.getElementById('banner-my-ships').textContent = myTotalShips;

  // Nettoyage projectiles vieux (> 10s)
  cleanOldProjectiles();

  earnedShips = 0; attackStep = 0; fromPlanet = null; toPlanet = null;
  document.getElementById('ap-ships').textContent = 0;
  document.getElementById('selection-ring')?.remove();
  attackPending = false;
  document.getElementById('attack-panel').classList.add('hidden');
  document.getElementById('question-panel').style.display = 'flex';

  // Relance quiz immédiatement
  startQuiz();
}

async function cleanOldProjectiles() {
  const snap = await get(ref(db, 'game/projectiles'));
  const projs = snap.val();
  if (!projs) return;
  const now = Date.now();
  const updates = {};
  Object.entries(projs).forEach(([k, p]) => {
    if (now - p.ts > 10000) updates[`game/projectiles/${k}`] = null;
  });
  if (Object.keys(updates).length > 0) update(ref(db), updates);
}

window.cancelAttackSelection = function() {
  attackStep = 1; fromPlanet = null;
  document.getElementById('selection-ring')?.remove();
  updateAttackUI();
};

window.skipAttack = function() {
  earnedShips = 0; attackStep = 0; fromPlanet = null; toPlanet = null;
  document.getElementById('selection-ring')?.remove();
  document.getElementById('attack-panel').classList.add('hidden');
  document.getElementById('question-panel').style.display = 'flex';
  startQuiz();
};

async function applyAttack(planetId, attackerTeam, ships) {
  const pRef = ref(db, `game/map/${planetId}`);
  const snap = await get(pRef);
  const planet = snap.val();
  if (!planet) return;
  if (planet.team === attackerTeam) {
    await update(pRef, { ships: planet.ships + ships });
  } else {
    const newShips = planet.ships - ships;
    if (newShips <= 0) {
      await update(pRef, { team: attackerTeam, ships: Math.abs(newShips) });
    } else {
      await update(pRef, { ships: newShips });
    }
  }
}

// ===== REGEN ADAPTATIVE =====
let lastPlayerCount = 0;
function restartRegen(playerCount) {
  if (playerCount === lastPlayerCount) return;
  lastPlayerCount = playerCount;
  if (regenInterval) clearInterval(regenInterval);
  const interval = Math.round(6000 / Math.max(playerCount, 1));
  regenInterval = setInterval(async () => {
    const snap = await get(ref(db, 'game/state'));
    if (snap.val() !== 'playing') return;
    const mapSnap = await get(ref(db, 'game/map'));
    const map = mapSnap.val();
    if (!map) return;
    const updates = {};
    Object.values(map).forEach(p => {
      if (p.team !== 'neutral') updates[`game/map/${p.id}/ships`] = (p.ships||0) + 1;
    });
    if (Object.keys(updates).length > 0) update(ref(db), updates);
  }, interval);
}

// ===== PROJECTILE ANIMATION =====
function animateProjectile(from, to, color, ships) {
  const layer = document.getElementById('projectiles-layer');
  const mx = (from.x+to.x)/2, my = (from.y+to.y)/2;
  const dx = to.y-from.y, dy = from.x-to.x;
  const len = Math.hypot(dx,dy)||1;
  const dist = Math.hypot(to.x-from.x, to.y-from.y);
  const cx = mx + dx/len*dist*0.3;
  const cy = my + dy/len*dist*0.3;

  // Ligne de trajet
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M${from.x},${from.y} Q${cx},${cy} ${to.x},${to.y}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '1');
  path.setAttribute('stroke-dasharray', '4 4');
  path.setAttribute('opacity', '0.35');
  layer.appendChild(path);

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('r', '6'); dot.setAttribute('fill', color); dot.setAttribute('opacity', '0.95');

  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('dy', '-10');
  lbl.setAttribute('font-family', 'Orbitron,monospace'); lbl.setAttribute('font-size', '12');
  lbl.setAttribute('font-weight', '700'); lbl.setAttribute('fill', color);
  lbl.setAttribute('pointer-events', 'none'); lbl.textContent = ships;

  g.appendChild(dot); g.appendChild(lbl);
  layer.appendChild(g);

  const start = performance.now();
  function animate(now) {
    const t = Math.min((now-start)/ANIM_DURATION, 1);
    const bx = (1-t)*(1-t)*from.x + 2*(1-t)*t*cx + t*t*to.x;
    const by = (1-t)*(1-t)*from.y + 2*(1-t)*t*cy + t*t*to.y;
    g.setAttribute('transform', `translate(${bx},${by})`);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      try { layer.removeChild(g); layer.removeChild(path); } catch(e) {}
    }
  }
  requestAnimationFrame(animate);
}

// ===== VICTORY =====
function checkWinner(planets) {
  const teams = { t1: 0, t2: 0, t3: 0 };
  let neutrals = 0;
  Object.values(planets).forEach(p => { if (p.team === 'neutral') neutrals++; else teams[p.team]++; });
  const nonNeutral = Object.values(planets).length - neutrals;
  for (const [team, count] of Object.entries(teams)) {
    if (nonNeutral > 0 && count/nonNeutral >= 0.8) { set(ref(db, 'game/winner'), team); return; }
  }
}

function showWinner(team) {
  clearInterval(timerInterval); clearInterval(regenInterval);
  document.getElementById('winner-screen').classList.remove('hidden');
  const color = TEAM_COLORS[team];
  document.getElementById('winner-name').textContent = TEAM_NAMES[team];
  document.getElementById('winner-name').style.color = color;
  document.getElementById('winner-name').style.textShadow = `0 0 60px ${color}`;
  document.getElementById('winner-sub').textContent = 'a conquis la galaxie !';
}

window.resetGame = async function() {
  await remove(ref(db, 'game'));
  await set(ref(db, 'game'), { state: 'lobby' });
  location.reload();
};

window.joinLobby = window.joinLobby;
window.launchGame = window.launchGame;
window.cancelAttackSelection = window.cancelAttackSelection;
window.skipAttack = window.skipAttack;
window.resetGame = window.resetGame;
</script>
